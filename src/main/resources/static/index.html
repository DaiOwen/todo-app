<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List - 任务管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">Todo List</h1>
            <p class="subtitle">保持专注，完成每一天</p>
            <button id="themeToggle" class="theme-toggle" title="切换浅色/深色主题">
                <span class="theme-icon">🌙</span>
            </button>
        </header>

        <main class="main">
            <div class="add-todo-card">
                <div class="form-group">
                    <input 
                        type="text" 
                        id="todoTitle" 
                        placeholder="输入新任务..." 
                        class="input input-title"
                    >
                </div>
                <div class="form-group">
                    <textarea 
                        id="todoDescription" 
                        placeholder="描述（可选）" 
                        class="input input-description"
                    ></textarea>
                </div>
                <div class="form-group">
                    <label class="priority-label">优先级：</label>
                    <div class="priority-select">
                        <label class="priority-option">
                            <input type="radio" name="priority" value="LOW" checked>
                            <span class="priority-badge priority-low">低</span>
                        </label>
                        <label class="priority-option">
                            <input type="radio" name="priority" value="MEDIUM">
                            <span class="priority-badge priority-medium">中</span>
                        </label>
                        <label class="priority-option">
                            <input type="radio" name="priority" value="HIGH">
                            <span class="priority-badge priority-high">高</span>
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label class="priority-label">截止日期：</label>
                    <input 
                        type="date" 
                        id="todoDueDate" 
                        class="input input-date"
                    >
                </div>
                <div class="form-group">
                    <label class="priority-label">分类：</label>
                    <input 
                        type="text" 
                        id="todoCategory" 
                        placeholder="例如：工作/生活/学习" 
                        class="input input-category"
                    >
                </div>
                <button id="addButton" class="btn btn-primary">
                    添加任务
                </button>
            </div>

            <div class="filter-tabs extra-filters">
                <div class="filter-label">分类筛选：</div>
                <div id="categoryFilters" class="category-filters"></div>
            </div>

            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="🔍 搜索任务..." 
                    class="input search-input"
                >
            </div>

            <div class="filter-tabs">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="active">进行中</button>
                <button class="filter-btn" data-filter="completed">已完成</button>
            </div>

            <div class="display-mode-tabs">
                <div class="filter-label">显示模式：</div>
                <div class="mode-buttons">
                    <button class="mode-btn active" data-mode="list">列表</button>
                    <button class="mode-btn" data-mode="group">按日期分组</button>
                </div>
            </div>

            <!-- 统计面板 -->
            <div class="stats-panel">
                <div class="stat-item">
                    <div class="stat-value" id="statTotal">0</div>
                    <div class="stat-label">总任务</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statActive">0</div>
                    <div class="stat-label">进行中</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statCompleted">0</div>
                    <div class="stat-label">已完成</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statToday">0</div>
                    <div class="stat-label">今日完成</div>
                </div>
            </div>

            <!-- 进度条 -->
            <div class="progress-container">
                <div class="progress-label">
                    <span>完成进度</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <!-- 列表模式：普通列表 -->
            <div id="todoList" class="todo-list"></div>

            <!-- 分组模式：按日期分组 -->
            <div id="groupedTodoList" class="grouped-list"></div>

            <div id="emptyState" class="empty-state">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                    <rect x="3" y="4" width="18" height="18" rx="2"/>
                    <line x1="16" y1="2" x2="16" y2="6"/>
                    <line x1="8" y1="2" x2="8" y2="6"/>
                    <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                <p>暂无任务，添加一个开始吧！</p>
            </div>

            <div class="batch-actions">
                <button id="batchCompleteBtn" class="btn btn-secondary">
                    标记全部已完成
                </button>
                <button id="batchClearBtn" class="btn btn-danger">
                    删除已完成
                </button>
            </div>
        </main>

        <footer class="footer">
            <p>Spring Boot + Vanilla JavaScript • <span id="todoCount">0</span> 个任务</p>
        </footer>
    </div>

    <template id="todoItemTemplate">
        <div class="todo-item" data-id="" draggable="true">
            <div class="todo-content">
                <div class="todo-header">
                    <h3 class="todo-title"></h3>
                    <div class="todo-badges">
                        <span class="category-badge"></span>
                        <span class="priority-badge"></span>
                        <span class="todo-status"></span>
                    </div>
                </div>
                <p class="todo-description"></p>
                <div class="todo-footer">
                    <div>
                        <small class="todo-due-date"></small>
                    </div>
                    <small class="todo-date"></small>
                </div>
            </div>
            <div class="todo-actions">
                <button class="btn-icon btn-toggle" title="切换状态">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                </button>
                <button class="btn-icon btn-delete" title="删除">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
        </div>
    </template>

    <script src="app.js"></script>
</body>
</html>
